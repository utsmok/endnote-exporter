name: Build and Release Executable

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build-and-release:
    strategy:
      matrix:
        # Define the operating systems to build on
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }} # Run the job on the specified OS from the matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Python 3.12+ required by pyproject.toml

      - name: Install dependencies
        run: pip install pyinstaller loguru

      - name: Set executable name based on OS
        id: set-name
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "EXECUTABLE_NAME=endnote-exporter.exe" >> $GITHUB_ENV
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "EXECUTABLE_NAME=endnote-exporter" >> $GITHUB_ENV
          else
            echo "EXECUTABLE_NAME=endnote-exporter" >> $GITHUB_ENV
          fi

      - name: Build with PyInstaller (Windows/Linux)
        if: runner.os != 'macOS'
        run: |
          pyinstaller --onefile --windowed --name "${{ env.EXECUTABLE_NAME }}" gui.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onedir --windowed --name "endnote-exporter" gui.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r endnote-exporter-macos.zip endnote-exporter.app
          echo "EXECUTABLE_NAME=endnote-exporter-macos.zip" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        # Each job in the matrix will upload its file to the same release
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Cross-Platform Release

            This release includes executables for **Windows**, **macOS**, and **Linux**.

            ### Features
            - Cross-platform support (Windows, macOS, Linux)
            - Supports both `.enl` and `.enlp` (macOS package) EndNote library formats
            - Platform-aware Documents folder detection (works with non-English Windows)
            - Case-insensitive `.Data` folder lookup for Linux compatibility

            ### Platform-Specific Notes
            - **macOS**: Supports both `.enl` and `.enlp` formats. The first run may require security exceptions in System Preferences.
            - **Linux**: Requires Tkinter to be installed (usually `python3-tk` package). Respects XDG_DOCUMENTS_DIR if set.
            - **Windows**: Full support including non-English system locales.

            Download the appropriate executable for your platform below.
          files: |
            dist/${{ env.EXECUTABLE_NAME }}*
