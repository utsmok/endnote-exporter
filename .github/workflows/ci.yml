name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  desktop-smoke:
    name: Desktop smoke validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile desktop entry points
        run: python -m compileall endnote_exporter.py gui.py platform_utils.py

  web:
    name: Web validation
    uses: ./.github/workflows/web-ci.yml
